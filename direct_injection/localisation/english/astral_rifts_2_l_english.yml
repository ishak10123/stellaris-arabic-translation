 astral_rift.2730.name: "ﻡﻮﺤﻠﻟﺍ ﺔﻠﻛﺁ ﺡﺎﻳﺭ"
 astral_rift.2730.desc: ".ﺔﻌﺋﺎﺟﻭ\n\n.ﺎﻣ ﺪﺣ ﻰﻟﺇ ﺔﻴﻋﺍﻭ ﻞﻗﻷﺍ ﻰﻠﻋ ﺢﻳﺮﻟﺍ ﻥﺃ ﺽﺍﺮﺘﻓﺍ ﻦﻣﻵﺍ ﻦﻤﻓ ،ﺎﻬﺘﺑﺎﺠﺘﺳﺍﻭ ﺓﺪﻳﺪﺸﻟﺍ ﺎﻬﺘﻗﺪﻟ ﺍﺮﻈﻧ .ﻡﻮﺤﻠﻟﺍ ﺔﻠﻛﺁ ﺡﺎﻳﺮﻟﺍ ﺔﻤﺣﺭ ﺖﺤﺗ ﺢﻄﺴﻟﺍ ﻰﻠﻋ ﺓﺎﻴﺤﻟﺍ ﻊﻘﺗ ،ﺕﺎﻳﺮﻄﻔﻟﺍ ﻪﻴﻠﻋ ﻆﻓﺎﺤﺗ ﻱﺬﻟﺍ ﺄﺠﻠﻤﻟﺍ ﺝﺭﺎﺧ\n\n.ﺀﺍﻮﻬﻟﺍ ﻲﻓ ﺓﺩﻮﺟﻮﻤﻟﺍ ﺕﺎﻤﻳﺰﻧﻹﺍ ﺔﻄﺳﺍﻮﺑ ﻪﻤﻀﻫ ﻢﺘﻴﻟ ﻂﻘﻓ ،ﺮﻐﺻﺃﻭ ﺮﻐﺻﺃ ﻊﻄﻗ ﻰﻟﺇ ﻪﻌﻴﻄﻘﺗ ﻢﺗ ﺓﺪﻫﺎﺸﻣ ﻯﻮﺳ ﺀﻲﺷ ﻱﺃ ﻞﻌﻓ ﺎﻨﻌﺳﻮﺑ ﻦﻜﻳ ﻢﻟ\n\n.ﺀﺍﻮﻬﻟﺍ ﻲﻓ ﻒﺣﺍﻭﺰﻟﺍ ﺡﺎﻳﺮﻟﺍ ﻦﻣ ﺩﺎﺣ ﺭﺎﻴﺗ ﻑﺬﻗ ،ﺎﺒﻳﺮﻘﺗ ﺭﻮﻔﻟﺍ ﻰﻠﻋ .ﺔﺣﻮﺘﻔﻤﻟﺍ ﻲﺿﺍﺭﻷﺍ ﻰﻟﺇ ﺭﻮﺒﻌﻟﺍ ﻞﺒﻗ ﺔﺒﺘﻌﻟﺍ ﺪﻨﻋ ﻒﺣﺍﻭﺰﻟﺍ ﻦﻣ ﺮﻴﻐﺻ ﻕﻮﻠﺨﻣ ﺩﺩﺮﺗ .ﺔﻔﺻﺎﻌﻟﺍ ﺕﺃﺪﻫ ﺚﻴﺣ ،ﻒﻬﻜﻟﺍ ﻞﺧﺪﻣ ﻰﻟﺇ ﺮﻄﻔﻟﺍ ﺎﻧﺩﺎﻗ"
