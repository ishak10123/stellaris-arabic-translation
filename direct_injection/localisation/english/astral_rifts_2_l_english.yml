 astral_rift.2935.desc: ".ﺚﺤﺒﻟﺍ ﺕﺎﻴﻧﺎﻜﻣﺇ ﻦﻣ ﺔﻋﻮﻨﺘﻣ ﺔﻋﻮﻤﺠﻣ ﺔﻤﺨﻀﻟﺍ ﺔﻨﻴﻌﻟﺍ ﻩﺬﻫ ﺢﺘﻔﺗ ﻥﺃ ﺐﺠﻳ \n\n .ﻞﻌﻔﻟﺍ ﻦﻣ ﺀﺰﺠﻛ ﺮﻬﻈﺗ ﺚﻴﺣ ،ﺎﻀﻳﺃ ﺓﺩﻮﺟﻮﻣ ﺽﺮﻌﻠﻟ ﺖﻋﻮﻄﺗ ﻲﺘﻟﺍ ﺔﻴﺋﺎﻀﻔﻟﺍ ﺕﺎﻨﺋﺎﻜﻟﺍ .ﻪﻧﻭﺭﺪﻘﻳ ﻢﻬﻧﺃ ﻭﺪﺒﻳ ﺎﻣ ﻮﻫﻭ ،ﻩﻮﻠﻛﺄﻴﻟ ﯫﻴﺷ ﺚﻴﻟﻮﻧﻮﻤﻠﻟ ﻦﻴﺒﺠﻌﻤﻟﺍ ﻦﻣ ﺪﻳﺪﻌﻟﺍ ﺮﻀﺣﺃ ﺪﻘﻟ .ﺎﻳﺭﺎﻛﺬﺗ ﺎﺒﺼﻧ ﻥﺎﻛ ﻮﻟ ﺎﻤﻛ ﻪﻴﻟﺇ ﺮﻈﻨﻳﻭ ﻪﻧﺎﻜﻣ ﻲﻓ ﺓﻮﻘﺑ ﻍﺭﻮﺒﻳﺎﺴﻟﺍ ﺖﻴﺒﺜﺗ ﻢﺘﻳ ،ﻞﺋﺎﻬﻟﺍ ﻪﻤﺠﺤﻟ ﺍﺮﻈﻧ \n\n .ﺔﻴﻜﻴﻟﻭﺭﺪﻴﻬﻟﺍ ﺕﺎﻧﻮﻜﻤﻟﺍ ﻦﻣ ﺪﻘﻌﻣ ﻡﺎﻈﻨﺑ ﺔﻠﻤﻜﻣ ﻚﺋﺎﺒﺴﻟﺍ ﻦﻣ ﺔﻴﻧﺪﻌﻣ ﻑﺍﺮﻃﺃﻭ ،ﻪﻋﺬﺟ ﻰﻠﻋ ﺔﺘﺒﺜﻣ ﺔﺠﻫﻮﺘﻣ ﺔﻗﺎﻃ ﺓﺍﻮﻧﻭ ،ﺔﻓﺎﻔﺷ ﺔﻴﺋﺎﺑﺮﻬﻛ ﺡﺍﻮﻟﺄﺑ ﺎﻌﻗﺮﻣ ﻥﻮﻠﻟﺍ ﻱﺩﺎﻣﺭ ﺍﺪﻠﺟ ﻯﺮﺧﻷﺍ ﺔﻴﺋﺎﻳﺰﻴﻔﻟﺍ ﺺﺋﺎﺼﺨﻟﺍ ﻞﻤﺸﺗ .ﺎﻀﻳﺃ ﻪﻋﻼﺘﺑﻻ ﻲﻔﻜﻳ ﺎﻤﺑ ﺮﻴﺒﻛ ﻢﻔﺑ ،ﺓﺮﻴﻐﺻ ﻞﻘﻧ ﺔﻨﻴﻔﺳ ﺽﺮﻋﻭ ﻉﺎﻔﺗﺭﺍ ﻰﻠﻋ ﻒﺣﺍﺰﻟﺍ ﻍﺭﻮﺒﻳﺎﺴﻟﺍ ﻒﻘﻳ"
