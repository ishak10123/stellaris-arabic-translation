 astral_rift.2725.name: "ﻱﺮﻄﻔﻟﺍ ﺪﻳﺪﻬﺘﻟﺍ"
 astral_rift.2725.desc: ".ﺔﻴﻤﺤﻣ ﺮﺜﻛﻷﺍ ﺕﯫﻴﺒﻟﺍ ﻰﻟﺇ ﻊﺟﺍﺮﺘﻟﺍ ﻰﻠﻋ ﺕﺎﻳﺮﻄﻔﻟﺍ ﺮﺒﺟﺃ ﺎﻤﻣ ،ﺐﻛﻮﻜﻟﺍ ﺢﻄﺳ ﺔﻳﻮﺴﺘﺑ ﺡﺎﻳﺮﻟﺍ ﺕﺎﻗﻮﻠﺨﻣ ﺖﻣﺎﻗ ،ﻞﺑﺎﻘﻤﻟﺍ ﻲﻓﻭ .ﺮﺛﺎﻜﺘﻟﺍ ﻦﻣ ﺡﺎﻳﺮﻟﺍ ﺕﺎﻗﻮﻠﺨﻣ ﻊﻨﻤﺗ ﺔﻳﺮﻄﻔﻟﺍ ﻢﻴﺛﺍﺮﺠﻟﺍ ﻥﺃ ﺢﺿﺍﻮﻟﺍ ﻦﻣ\n\n.ﻥﺎﻣﺄﺑ ﺞﻀﻨﺘﻟ ﺡﺎﻳﺮﻟﺍ ﺎﻬﻠﻤﺤﺗ ﻲﺘﻟﺍ ﺔﻘﻴﻗﺪﻟﺍ ﺔﻴﺤﻟﺍ ﺕﺎﻨﺋﺎﻜﻠﻟ ﺔﻴﻤﺤﻣ ﺔﺌﻴﺑ ﺮﻓﻮﻳ ﺎﻤﻣ ،ﺎﻴﻃﻭﺮﺨﻣ ﺎﻣﺭﻭ ﻞﻜﺷﻭ ﺀﺍﺩﺮﺠﻟﺍ ﺲﻳﺭﺎﻀﺘﻟﺎﺑ ﻖﺼﺘﻟﺍ ﺮﻴﻐﺼﻟﺍ ﺾﻴﺒﻟﺍ ﻦﻣ ﻲﻘﺑ ﺎﻣ\n\n.ﺔﻳﺮﻄﻔﻟﺍ ﻢﻴﺛﺍﺮﺠﻟﺍ ﺀﺎﻄﻏ ﺐﺒﺴﺑ ﺎﻌﻳﺮﺳ ﺎﻬﻤﻈﻌﻣ ﻚﻜﻔﺗ ﺚﻴﺣ ،ﺢﻄﺴﻟﺍ ﻰﻟﺇ ﺕﺎﻨﺋﺎﻜﻟﺍ ﻩﺬﻫ ﺖﻔﻃ .ﺀﺍﻮﻬﻟﺎﺑ ﺔﻟﻮﻤﺤﻤﻟﺍ ﺓﺮﻌﺸﻤﻟﺍ ﺕﺎﻳﺮﻄﻔﻟﺍ ﻦﻣ ﺎﻣﺰﺣ ﺔﻘﻠﻄﻣ ،ﺔﻴﻌﻴﺒﻄﻟﺍ ﺮﻇﺎﻨﻤﻟﺍ ﻕﻮﻓ ﺎﻨﻫ ﺎﻫﺎﻨﻌﺒﺗﺍ ﻲﺘﻟﺍ ﺀﺍﻮﻬﻟﺍ ﺕﺍﺭﺎﻴﺗ ﺖﻘﻓﺪﺗ \n\n .ﻍﺍﻮﺑﻷﺍ ﻑﺬﻘﺗ ﻲﺘﻟﺍ ﺕﺎﻳﺮﻄﻔﻟﺍ ﻦﻣ ﺕﺎﻋﻮﻤﺠﻣ ﻱﻭﺆﻳ ﻲﻔﺨﻣ ﻖﺷﻭ ﻒﻳﻮﺠﺗ ﻞﻛ ﻥﺎﻛ ،ﺐﻟﺎﻐﻟﺍ ﻲﻓ ﺀﺍﺩﺮﺟﻭ ﺔﻳﻮﺘﺴﻣ ﺔﻴﻌﻴﺒﻄﻟﺍ ﺮﻇﺎﻨﻤﻟﺍ ﺖﻧﺎﻛ ﺎﻤﻨﻴﺑ .ﺀﺍﺮﻔﺼﻟﺍ ﺐﺤﺴﻟﺍ ﻦﻣ ﺔﻜﻴﻤﺳ ﺔﻘﺒﻃ ﻪﻗﻮﻓ ﻡﻮﺤﺗ ﺖﻧﺎﻛ ﻱﺬﻟﺍ ﺐﻛﻮﻜﻟﺍ ﺢﻄﺳ ﻰﻟﺇ ﺎﻨﻠﺻﻭ"
