 astral_rift.2715.desc: ".ﻥﻵﺍ ﺔﻔﺻﺎﻌﻟﺍ ﺕﺃﺪﻫ ﺚﻴﺣ ﺢﻄﺴﻟﺍ ﻮﺤﻧ ﻯﺮﺧﺃ ﺓﺮﻣ ﺎﻨﻌﻓﺩ ﻢﺗﻭ ،ﺭﺎﻴﺘﻟﺍ ﺲﻔﻧ ﻲﻓ ﺎﻨﻌﻗﻭ ﺪﻗﻭ .ﺔﻴﺛﺍﺭﻮﻟﺍ ﺓﺩﺎﻤﻟﺍ ﻦﻣ ﺮﻌﺸﻟﺍ ﻪﺒﺸﺗ ﺎﻃﻮﻴﺧ ﺕﺍﺭﺎﻴﺘﻟﺍ ﻩﺬﻫ ﺾﻌﺑ ﻞﻤﺤﺗ \n\n ."ﺔﻴﺣ" ﺡﺎﻳﺭ ﺏﻮﺒﻫ ﺪﻴﻟﻮﺗ ﻰﻠﻋ ﻦﻳﺭﺩﺎﻗ ﻥﻮﺤﺒﺼﻳ ،ﺎﻌﻣ ﻞﻤﻌﻟﺍ ﻝﻼﺧ ﻦﻣﻭ .ﺍﺪﺣﺍﻭ ﻼﻘﻋ ﺔﻘﻴﻗﺪﻟﺍ ﺔﻴﺤﻟﺍ ﺕﺎﻨﺋﺎﻜﻟﺍ ﻩﺬﻫ ﻞﻜﺸﺗ ،ﻲﻔﻜﻳ ﺎﻤﺑ ﺓﺮﻴﺒﻜﻟﺍ ﺕﺎﻌﻤﺠﺘﻟﺍ ﻲﻓ ﻪﻧﺃ ﻰﻟﺇ ﺔﻨﻴﻌﻠﻟ ﻲﻓﺎﺿﻹﺍ ﻞﻴﻠﺤﺘﻟﺍ ﺭﺎﺷﺃ \n\n .ﺎﻔﻄﻟ ﺮﺜﻛﺃ ﺭﺎﻴﺗ ﻰﻟﺇ ﺔﻴﺗﺎﻌﻟﺍ ﺡﺎﻳﺮﻟﺍ ﺖﻟﻮﺤﺗ ،ﺓﺄﺠﻓﻭ .ﻂﻴﺤﻤﻟﺍ ﻱﻮﺠﻟﺍ ﻑﻼﻐﻟﺍ ﻲﻓ ﻩﺎﻨﻘﻠﻃﺃﻭ ﻪﺑﺎﺸﻣ ﻥﻮﻣﺮﻫ ﻊﻴﻨﺼﺘﺑ ﺎﻨﻤﻗ ،ﺔﺑﺮﺠﺘﻛ\n\n.ﺡﺎﻳﺮﻟﺍ ﻞﺧﺍﺩ ﺔﻘﻴﻗﺩ ﺔﻴﺣ ﺕﺎﻨﺋﺎﻛ ﺩﻮﺟﻭ ﺎﻨﺘﻨﻴﻋ ﺕﺪﻛﺃ"
