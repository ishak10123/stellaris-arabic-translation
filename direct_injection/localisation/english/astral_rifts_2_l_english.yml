 astral_rift.2710.desc: ".ﺮﻄﻔﻟﺍ ﻊﻣ ﻞﺻﺍﻮﺘﻟﺍﻭ ﺔﻜﺒﺸﻟﺍ ﻩﺬﻫ ﻦﻣ ﺓﺩﺎﻔﺘﺳﻻﺍ ﺎﻨﻨﻜﻤﻳ ﺎﻤﺑﺭ .ﺔﻔﻠﺘﺨﻤﻟﺍ ﺔﻳﺮﻄﻔﻟﺍ ﺕﺎﻋﻮﻤﺠﻤﻟﺍ ﻦﻴﺑ ﻂﺑﺮﺗ ﻲﺘﻟﺍ ﺔﻴﺒﺼﻌﻟﺍ ﻚﺑﺎﺸﻤﻟﺍﻭ ﺕﺎﻀﺒﻨﻟﺍ ﻦﻣ ﺔﻜﺒﺷ ؛ﺎﻔﻴﻌﺿ ﺎﻴﺋﺎﺑﺮﻬﻛ ﻻﺎﺠﻣ ﺎﻨﻔﺸﺘﻛﺍ ،ﻒﻬﻜﻟﺍ ﻞﺧﺍﺩ\n\n.ﺪﻛﺍﺮﻟﺍ ﺀﺍﻮﻬﻟﺍ ﻲﻓ ﻢﻴﺛﺍﺮﺠﻟﺍ ﻦﻣ ﻒﻴﺜﻛ ﺏﺎﺒﺿ ﻖﻠﻋﻭ ،ﺭﺍﺪﺤﻧﻻﺍ ﺓﺪﻳﺪﺷ ﻥﺍﺭﺪﺠﻟﺍ ﺐﻠﺤﻄﻟﺍ ﻰﻄﻏ .ﻡﻼﻈﻟﺍ ﻲﻓ ﺔﺒﺣﺎﺸﻟﺍ ﺕﺎﺗﺎﺒﻨﻟﺍ ﺖﻤﻧﻭ ﺔﺒﻃﺮﻟﺍ ﺲﻳﺭﺎﻀﺘﻟﺍ ﻝﻮﻃ ﻰﻠﻋ ﺔﻔﺨﺑ ﻞﻘﻨﺘﺗ ﺕﺍﺮﺸﺤﻟﺍ ﺕﺍﺮﻤﻌﺘﺴﻣ ﺖﻧﺎﻛ ،ﺮﻄﻔﻟﺍ ﺕﺎﻋﻮﻤﺠﻣ ﻦﻴﺑ .ﺮﻔﺻﻷﺍ ﺮﻄﻔﻟﺎﺑ ﺔﺌﻴﻠﻣ ﺖﻧﺎﻛ ﻲﺘﻟﺍ ﺓﺮﻔﺼﻤﻟﺍ ﺔﺑﺮﺘﻟﺍ ﻰﻠﻋ ﺎﻤﺋﺎﻏ ﻼﺋﺎﺳ ﺮﻄﻘﺗ ﺔﻜﻴﻤﺴﻟﺍ ﻂﺑﺍﻮﻬﻟﺍ ﺖﻧﺎﻛ .ﻊﻔﺗﺮﻣ ﻒﻘﺳ ﺕﺍﺫ ﺔﻤﺨﺿ ﺔﻓﺮﻏ ﺎﻨﻠﺧﺩ ،ﺔﻘﻴﺿ ﺕﺍﺮﻤﻣ ﺮﺒﻋ ﻞﻘﻨﺘﻟﺍ ﺪﻌﺑ \n\n .ﺲﻘﻄﻟﺍ ﻦﻣ ﺎﻴﻤﺤﻣ ﺎﻔﻬﻛ ﺎﻨﻠﺧﺩ ﻰﺘﺣ ﻢﻴﺛﺍﺮﺠﻟﺍ ﻦﻣ ﺔﻴﺘﻳﺮﺒﻛ ﺔﻔﻴﺜﻛ ﺐﺤﺳ ﺮﺒﻋ ﺎﻨﻛﺮﺤﺗ ،ﺃﺪﻬﻳ ﻻ ﻱﺬﻟﺍ ﺡﺎﻳﺮﻟﺍ ﻞﻴﺳ ﺮﺒﻋ ﻻﻭﺰﻧ"
