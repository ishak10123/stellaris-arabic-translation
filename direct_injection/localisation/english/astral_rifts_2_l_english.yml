 astral_rift.2020.desc: ".ﺭﺮﻀﻟﺍ ﻦﻣ ﺪﻳﺰﻤﻟﺍ ﻊﻨﻤﻳﻭ ﺔﻴﻣﻮﻤﻜﻟﺍ ﺕﺎﻴﻠﻴﻔﻄﻟﺍ ﻲﺿﺮﻳ ﺪﻗ ﻲﻤﺠﻨﻟﺍ ﻂﻴﺨﻟﺍ ﻦﻣ ﺓﺮﻴﻐﺻ ﺔﻴﻤﻛ ﻦﻘﺣ ﻥﺃ ﻊﻗﻮﺘﻧ\n\n.ﻚﻠﻬﻳ ﻥﺃ ﻞﻤﺘﺤﻤﻟﺍ ﻦﻣ ،ﻝﺪﻌﻤﻟﺍ ﺍﺬﻬﺑ .ﻒﻠﺘﻠﻟ ﻕﻮﻠﺨﻤﻟﺍ ﺔﺠﺴﻧﺃ ﺽﺮﻌﺘﺗ ،ﻦﻴﻨﺠﻟﺍ ﺝﺭﺎﺧﻭ ﻞﺧﺍﺩ ﺓﻮﻘﺑ ﻢﻬﻟﺎﻘﺘﻧﺍ ﺀﺎﻨﺛﺃ .ﺎﻀﻳﺃ ﺕﺎﻴﻠﻴﻔﻄﻟﺍ ﺰﻴﻔﺤﺗ ﻢﺗ ،ﻚﻟﺫ ﻊﻣﻭ \n\n .ﺔﻠﺧﺍﺪﺘﻤﻟﺍ ﺔﻋﺭﺪﻤﻟﺍ ﻙﺍﻮﺷﻷﺍﻭ ﺢﺋﺎﻔﺼﻟﺍ ﻦﻣ ﺔﻜﺒﺸﺑ ﺓﺎﻄﻐﻣ ﺓﺪﺣﺍﻭ - ﺔﻀﻴﺒﻟﺍ ﻥﺍﺭﺪﺟ ﻰﻠﻋ ﻊﻓﺪﻟﺍ ﻲﻓ ﺍﺭﻮﻄﺗ ﺮﺜﻛﺃ ﻕﻮﻠﺨﻣ ﺃﺪﺑ ،ﺍﺪﺟ ﺓﺮﻴﺼﻗ ﺔﻴﻨﻣﺯ ﺓﺮﺘﻓ ﻲﻓﻭ .ﺔﻋﺮﺠﻟﺍ ﺮﻳﺪﻘﺗ ﻲﻓ ﺎﻧﺄﻄﺧﺃ ﺎﻤﺑﺭ ،ﻊﻗﺍﻮﻟﺍ ﻲﻓ .ﺎﻘﺑﺎﺳ ﺔﻠﻣﺎﺨﻟﺍ ﺔﻨﻴﻌﻟﺍ ﻂﻴﺸﻨﺗ ﻢﺗ ﺪﻘﻓ ،ﺔﻴﻣﻮﻤﻜﻟﺍ ﺕﺎﻴﻠﻴﻔﻄﻟﺍ ﻦﻣ ﻢﻏﺮﻟﺍ ﻰﻠﻋ \n\n .ﻡﺎﻤﺘﻫﻼﻟ ﺓﺮﻴﺜﻤﻟﺍ ﺞﺋﺎﺘﻨﻟﺍ ﺾﻌﺑ ﻰﻟﺇ ﻑﻮﺸﻜﻤﻟﺍ ﻦﻴﻨﺠﻟﺍ ﻲﻓ ﺐﺣﺎﺸﻟﺍ ﻞﺋﺎﺴﻟﺍ ﻦﻘﺣ ﻯﺩﺃ"
