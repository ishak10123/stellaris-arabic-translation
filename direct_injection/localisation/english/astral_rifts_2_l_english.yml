 astral_rift.2010.desc: ".ﻝﻭﻷﺍ ﻡﺎﻘﻤﻟﺍ ﻲﻓ ﺎﻨﻫ ﻰﻟﺇ ﻢﻬﺑﺬﺟ ﺎﻣ ﻮﻫ ﺍﺬﻫ ﺎﻤﺑﺭﻭ .ﺔﻓﺮﻐﻟﺍ ﻩﺬﻫ ﻂﺳﻭ ﻲﻓ ﺐﻳﺮﻏ ﻞﺋﺎﺳ ﺀﺎﻋﻭ ﻰﻟﺇ ﻥﻮﺑﺬﺠﻨﻳ ﻢﻫﺎﻨﻳﺃﺭ ﺪﻘﻟ \n\n .ﺓﺄﺸﻨﻤﻟﺍ ﻩﺬﻬﻟ ﺩﻮﺼﻘﻤﻟﺍ ﺚﺤﺒﻟﺍ ﻒﻗﻭﺃ ﺪﻗﻭ ،ﺪﺼﻗ ﺮﻴﻏ ﻦﻋ ﺎﻨﻫ ﻩﺅﺎﻋﺪﺘﺳﺍ ﻢﺗ ﻞﻴﻔﻄﻟﺍ ﺍﺬﻫ ﻥﺃ ﺪﻘﺘﻌﻧ .ﺪﻴﻌﺑﻭ ﺰﻴﻤﺘﻣ ﺪﻌﺑ ﻦﻣ ﺕﺄﺸﻧ ﺕﺎﻴﻠﻴﻔﻄﻟﺍ ﻥﺃ ﻰﻟﺇ ﻦﻴﻨﺋﺎﻜﻟﺍ ﻼﻜﻟ ﻲﻤﺠﻨﻟﺍ ﻊﺒﺘﺘﻟﺍ ﺮﻴﺸﻳ \n\n .ﻲﻠﻴﻔﻄﻟﺍ ﻙﻮﻠﺴﻟ ﺹﺎﺧ ﻞﻜﺸﺑ ﺔﻣﻭﺎﻘﻣ ﻥﻮﻜﺗ ﻥﺃ ﺐﺠﻳ ﺓﺩﺪﺤﻤﻟﺍ ﺔﻨﻴﻌﻟﺍ ﻩﺬﻫ ﻥﺈﻓ ،ﺮﺒﺘﺨﻤﻟﺍ ﺍﺬﻫ ﻲﻓ ﻲﺤﻟﺍ ﺾﻴﺒﻟﺍ ﻦﻣ ﺍﺪﺟ ﻞﻴﻠﻗ ﺩﺪﻋ ﺩﻮﺟﻮﻟ ﺍﺮﻈﻧﻭ .ﻪﺴﻔﻧ ﻦﻴﻨﺠﻟﺍ ﻞﺧﺍﺩ ﻞﻤﺘﺤﻤﻟﺍ ﻦﻣﻭ ،ﺔﻀﻴﺒﻟﺍ ﻑﻼﻏ ﻦﻣ ﻲﻠﺧﺍﺪﻟﺍ ﺀﺰﺠﻟﺍ ﻝﻮﺣ ﻲﺋﺍﻮﺸﻋ ﻞﻜﺸﺑ ﻒﺘﻠﺗ ﻲﻫﻭ .ﻑﻭﺮﻌﻣ ﻲﺟﻮﻟﻮﻴﺑ ﻦﺋﺎﻛ ﻱﻷ ﺎﻬﻋﻮﻧ ﻦﻣ ﺓﺪﻳﺮﻓ ﺔﻴﻣﻮﻤﻛ ﺺﺋﺎﺼﺧ ﻚﻠﺘﻤﺗ ﺕﺎﻴﻠﻴﻔﻄﻟﺍ ﻥﺃ ﺮﻈﻨﻠﻟ ﺖﻓﻼﻟﺍ ﻦﻣﻭ\n\n.ﺔﺒﻳﺮﻏ ﺕﺎﻴﻠﻴﻔﻄﺑ ﻰﻄﻐﻣﻭ ﺔﻳﺬﻐﺘﻟﺍ ﺀﻮﺳ ﻦﻣ ﻲﻧﺎﻌﻳ ﻪﻠﺧﺍﺪﺑ ﻦﻴﻨﺠﻟﺍ ﻥﺃ ﻭﺪﺒﻳ\n\n.ﺾﻴﺒﻟﺍ ﻦﻴﺑ ﺔﺤﺻ ﺮﺜﻛﻷﺍ ﺔﻨﻴﻌﻟﺍ ﺎﻨﺤﺘﻓ ﺪﻘﻟ"
