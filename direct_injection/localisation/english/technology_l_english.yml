#  tech_society_1:0 "Standardized Interstellar Timekeeping"
#  tech_society_1_desc:1 "In an era where interstellar travel is commonplace, the adoption of a unified temporal framework serves as a linchpin for progress. Whether for organizing galactic commutes or facilitating astrophysical observations, standard time represents a visionary stride towards unity and precision."
 #tech_society_2:0 "Xenobiology"
 #tech_society_2_desc:1 "The study of xenobiology invites us to explore the possibility of life beyond conventional paradigms, thriving in environments far removed from our own. Every new biosphere allows for parallels to be drawn and the origins of life itself to become clearer."
 #tech_society_3:0 "Exoplanetary Logistics"
 #tech_society_3_desc:1 "Comprehensive logistical systems optimize the movement of people, resources, and information across interstellar distances. This paradigm not only promotes cohesion between core world and colony, but serves as a testament to our adaptability and resilience in the face of large-scale challenges."
 #tech_society_4:0 "Origins of Sapience"
 #tech_society_4_desc:1 "By deciphering the neural and cognitive mechanisms that underpin sapience, researchers can now delineate its boundaries and constraints."
