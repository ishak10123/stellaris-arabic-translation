 bio.135.desc: ".ﻞﻀﻓﺃ ﻞﻜﺸﺑ ﺓﺮﻫﺎﻈﻟﺍ ﻩﺬﻫ ﺔﺳﺍﺭﺪﻟ ﺔﻟﻭﺆﺴﻤﻟﺍ ﺔﻴﺒﺼﻌﻟﺍ ﺕﻼﻗﺎﻨﻟﺍ ﺝﺍﺮﺨﺘﺳﺍ ﺎﻨﻨﻜﻤﻳ ،ﻚﻟﺫ ﻦﻣ ﻻﺪﺑﻭ .ﺔﻠﺛﺎﻤﺘﻣ ﺕﯫﻴﺑ ﻲﻓ ﺐﻨﺟ ﻰﻟﺇ ﺎﺒﻨﺟ ﻞﻤﻌﻠﻟ ﻦﻴﺤﻧﺎﻤﻟﺍﻭ ﻦﻴﺨﺴﻨﺘﺴﻤﻟﺍ ﻦﻴﺑ ﻊﻤﺠﺗ ﺓﺭﺩﺎﺒﻣ ﺬﻴﻔﻨﺗ ﺎﻨﻨﻜﻤﻳ \n\n .ﻡﺎﻤﺘﻫﻼﻟ ﺓﺮﻴﺜﻤﻟﺍ ﺕﻻﺎﻤﺘﺣﻻﺍ ﺾﻌﺑ ﺍﺬﻫ ﻡﺪﻘﻳ .ﺓﺮﺠﻤﻟﺍ ﻦﻣ ﻯﺮﺧﺃ ﻦﻛﺎﻣﺃ ﻲﻓ ﺎﻬﺗﺍﺮﻴﻈﻧ ﺕﺎﻓﺮﺼﺗ ﺭﺎﻴﻃ ﻥﻭﺪﺑ ﺔﻳﺩﺮﻔﻟﺍ ﺕﺍﺮﺋﺎﻄﻟﺍ ﺲﻜﻌﺗ ﺚﻴﺣ ،ﺔﻓﺎﺴﻤﻟﺍ ﻦﻋ ﺮﻈﻨﻟﺍ ﺾﻐﺑ ﺓﺮﻫﺎﻈﻟﺍ ﻩﺬﻫ ﺮﻤﺘﺴﺗ \n\n .ﺪﺼﻗ ﺮﻴﻏ ﻦﻋ ﺐﻨﺟ ﻰﻟﺇ ﺎﺒﻨﺟ ﻙﺮﺤﺘﺗ ﺎﻬﻠﻌﺠﻳ ﺎﻤﻣ ،ﻦﻴﻴﻨﻴﺠﻟﺍ ﻦﻴﻋﺮﺒﺘﻤﻟﺎﺑ ﺎﻴﺒﺼﻋ ﺔﻄﺒﺗﺮﻣ ﺔﺨﺴﻨﺘﺴﻤﻟﺍ ﺕﺎﻧﺍﻮﻴﺤﻟﺍ ﺾﻌﺑ ﻥﺃ ﻭﺪﺒﻳ .ﺔﻳﺩﺎﻋ ﺮﻴﻏ ﺞﺋﺎﺘﻧ ﻦﻋ ﺓﺮﻴﺧﻷﺍ ﺥﺎﺴﻨﺘﺳﻻﺍ ﺏﺭﺎﺠﺗ ﺕﺮﻔﺳﺃ ﺪﻘﻟ"
