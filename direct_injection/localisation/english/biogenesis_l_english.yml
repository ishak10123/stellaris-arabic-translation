 bio.140.desc: ".ﻰﻠﻋﻷﺍ ﻯﻮﺘﺴﻤﻟﺍ ﺕﺍﺫ ﺔﻴﻓﺮﻌﻤﻟﺍ ﺎﻨﻔﺋﺎﻇﻭ ﺾﻌﺑ ﻰﻠﻋ ﺮﺛﺃ ﺎﻤﻣ ،ﺕﺎﺑﺍﺮﻄﺿﻻﺍ ﻰﻟﺇ ﺔﻳﺩﺮﻔﻟﺎﺑ ﺪﻳﺍﺰﺘﻤﻟﺍ ﻢﻬﻴﻋﻭ ﻯﺩﺃ ﺪﻘﻓ :ﺔﻔﻠﻜﺘﺑ ﻲﺗﺄﺗ ﺪﺋﺍﻮﻔﻟﺍ ﻩﺬﻫ ﻥﺈﻓ ،ﻚﻟﺫ ﻊﻣﻭ .ﻒﻴﻜﺘﻟﺍ ﻞﺟﺃ ﻦﻣ ﺔﻴﻠﺨﻠﻟ ﺪﺣﻮﻤﻟﺍ ﺕﻮﺼﻟﺍ ﺢﻓﺎﻜﻳ ﺚﻴﺣ ﺕﺍﻮﺠﻔﻟﺍ ﺪﺴﺗ ﻥﺃ ﻦﻜﻤﻳ ﻞﻘﺘﺴﻣ ﻞﻜﺸﺑ ﺮﻴﻜﻔﺘﻟﺍ ﻰﻠﻋ ﻢﻬﺗﺭﺪﻗ ﻥﺇ .ﺔﻋﻮﻤﺠﻤﻟﺍ ﺝﺭﺎﺧ ﺕﺎﻧﺎﻴﻛ ﻊﻣ ﻞﻋﺎﻔﺘﻟﺍ ﻲﻓ ﺓﺪﻴﻔﻣ ،ﻼﻘﺘﺴﻣ ﺍﺮﻜﻓﻭ ﺔﻳﺩﺮﻓ ﺕﺎﻳﻮﻫ ﻥﻵﺍ ﻚﻠﺘﻤﺗ ﻲﺘﻟﺍ ،ﺭﺎﻴﻃ ﻥﻭﺪﺑ ﺔﻳﺩﺮﻔﻟﺍ ﺕﺍﺮﺋﺎﻄﻟﺍ ﻩﺬﻫ ﻥﻮﻜﺗ ﺪﻗﻭ .ﺓﺪﻳﺮﻓ ﺔﺻﺮﻓ ﻞﺜﻤﻳ ﻪﻧﺃ ﻻﺇ ،ﻖﻠﻘﻠﻟ ﺮﻴﺜﻣ ﻪﻧﺃ ﻦﻣ ﻢﻏﺮﻟﺍ ﻰﻠﻋ ،ﻑﺍﺮﺤﻧﻻﺍ ﺍﺬﻫﻭ \n\n .ﺔﻘﻓﺍﻮﺘﻣ ﺮﻴﻏ ﺔﺨﺴﻨﺘﺴﻤﻟﺍ ﺕﺎﻧﺍﻮﻴﺤﻟﺍ ﻩﺬﻫ ﻥﺃ ﻻﺇ ،ﺓﺪﻴﺟ ﺔﻴﺟﻮﻟﻮﻴﺑ ﺕﺎﻨﻴﻋ ﺎﻬﻧﺃ ﻦﻣ ﻢﻏﺮﻟﺍ ﻰﻠﻋ .ﻊﻨﻄﺼﻣ ﻞﻜﺸﺑ ﺎﻬﺠﻀﻧ ﻊﻳﺮﺴﺘﺑ ﺎﻨﻤﻗﻭ ﺔﺤﻧﺎﻣ ﺓﺩﺎﻣ ﻦﻣ ﺔﺨﺴﻨﺘﺴﻤﻟﺍ ﺕﺎﻧﺍﻮﻴﺤﻟﺍ ﻦﻣ ﺔﻋﻮﻤﺠﻣ ﺔﻋﺍﺭﺰﺑ ﺎﻨﻤﻗ ،ﺔﻴﻠﺨﻟﺍ ﻢﻋﺪﻟ ﺔﻟﻭﺎﺤﻣ ﻲﻓﻭ"
