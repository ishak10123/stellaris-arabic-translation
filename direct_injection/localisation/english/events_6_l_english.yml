 site_space_shanty_dig:0 "ﺔﺟﺎﺟﺯ ﻲﻓ ﺔﻟﺎﺳﺭ"
 space_shanty_intro:0 ".ﺔﻴﺋﺎﻀﻔﻟﺍ ﺔﺒﻛﺮﻤﻟﺍ ﻩﺬﻫ ﻞﺧﺍﺩ ﺓﺄﺒﺨﻤﻟﺍ ﺭﺍﺮﺳﻷﺍ ﻒﺸﻛ ﻰﻠﻋ ﻥﻮﺼﻳﺮﺣ ﺎﻨﻳﺪﻟ ﺭﺎﺛﻵﺍ ﺀﺎﻤﻠﻋ .ﻡﻮﺠﻨﻟﺍ ﺀﻮﺿ ﻦﻋ ﺔﺠﺗﺎﻨﻟﺍ ﺔﻴﺴﻤﺸﻟﺍ ﺡﺎﻳﺮﻟﺍ ﻰﻠﻋ ﺖﻓﺮﺠﻧﺍﻭ ﺔﻴﺴﻤﺸﻟﺍ ﺔﻗﺎﻄﻟﺍ ﺕﺪﺼﺣ ﺔﻨﻴﻔﺴﻟﺍ ﻥﺃ ﺽﺮﺘﻔﻤﻟﺍ ﻦﻣ .ﺀﺎﻀﻔﻟﺍ ﻍﺍﺮﻓ ﻲﻓ ﺓﺮﺸﺘﻨﻣ ﺓﺮﻴﺒﻛ ﺔﻋﺮﺷﺃ ﻰﻠﻋ ﺔﺒﻛﺮﻤﻟﺍ ﺕﺪﻤﺘﻋﺍ ،ﺔﺜﻳﺪﺤﻟﺍ ﻦﻔﺴﻟﺍ ﻲﻓ ﺔﻣﺪﺨﺘﺴﻤﻟﺍ ﻚﻠﺘﻟ ﻞﺛﺎﻤﻣ ﻊﻓﺩ ﻡﺎﻈﻧ ﻡﺍﺪﺨﺘﺳﺍ ﻦﻣ ﻻﺪﺑﻭ .ﻱﺩﺎﻋ ﺮﻴﻏ ﻢﻴﻤﺼﺗ ﺕﺍﺫ ﺔﻤﻳﺪﻗ ﺀﺎﻀﻓ ﺔﻨﻴﻔﺳ ﻡﺎﻄﺣ ﻰﻠﻋ ﺎﻧﺮﺜﻋ ﺪﻘﻟ"
 space_shanty_intro_bio: ".ﻡﻮﺠﻨﻠﻟ ﻡﻮﻳ ﺕﺍﺫ ﺎﻫﺎﻨﻏ ﻲﺘﻟﺍ ﺔﻴﻨﻏﻷﺍ ﺔﻓﺮﻌﻤﻟ ،ﻂﻘﻓ ﺎﻤﺑﺭ ،ﺎﻤﺑﺭﻭ ،ﺓﺮﻴﺧﻷﺍ ﻪﺘﻠﺣﺭ ﺀﺍﺪﺻﺃ ﻰﻟﺇ ﻉﺎﻤﺘﺳﻻﺍﻭ ،ﻩﺎﻳﺎﻘﺑ ﺔﺳﺍﺭﺩ ﻰﻠﻋ ﻥﻮﺼﻳﺮﺣ ﺎﻨﻳﺪﻟ ﺔﻳﻮﻴﺤﻟﺍ ﺭﺎﺛﻵﺍ ﺀﺎﻤﻠﻋ ﻥﺇ .ﺪﻛﺆﻣ ﺮﻴﻏ ﻝﺍﺰﻳ ﻻ ﺎﻤﻬﻨﻴﺑ ﺀﻲﺷ ﻱﺃ ﻭﺃ ﻩﺭﻮﻄﺗ ﻭﺃ ﻪﺘﺳﺪﻨﻫ ﺖﻤﺗ ﺪﻗ ﻦﺋﺎﻜﻟﺍ ﺍﺬﻫ ﻥﺎﻛ ﺍﺫﺇ ﺎﻣ .ﺎﻳﺎﻘﺑ ﺔﻗﺰﻤﻣ ﻰﻟﺇ ﻖﺑﺎﺴﻟﺍ ﻲﻓ ﺔﻌﻣﻻ ﺖﻧﺎﻛ ﻲﺘﻟﺍ ﺎﻬﺘﻋﺮﺷﺃ ﺖﻟﻮﺤﺗﻭ ،ﻑﻮﺸﻜﻣﻭ ﻖﻘﺸﺘﻣ ﺎﻫﺭﺎﻃﺇ ،ﺔﻠﺑﺍﺫ ﺓﺮﺸﻗ ﺩﺮﺠﻣ ﻦﻣ ﺮﺜﻛﺃ ﺪﻌﺗ ﻢﻟ ،ﻥﻵﺍ\n\n.ﺔﻴﺋﺮﻣ ﺮﻴﻏ ﺕﺍﺭﺎﻴﺗ ﻲﻓ ﻖﻟﺰﻨﻳ ﻢﻴﻈﻋ ﻱﻭﺎﻤﺳ ﻥﺎﺛﺎﻳﻮﻟ ﻞﺜﻣ ﺓﺪﻴﻌﺒﻟﺍ ﻡﻮﺠﻨﻟﺍ ﻉﺎﻌﺷﺈﺑ ﻢﻌﻨﺗﻭ ،ﺔﻴﻧﻮﻜﻟﺍ ﺡﺎﻳﺮﻟﺍ ﻲﻓ ﻕﻼﻄﻧﻻﺍ ﻰﻠﻋ ﺓﺭﺩﺎﻗ ﻡﻮﻳ ﺕﺍﺫ ﺖﻧﺎﻛ ،ﺔﻴﺋﺎﺸﻏﻭ ﺔﻌﺳﺍﻭ ﺔﻋﺮﺷﺃ ﻚﻠﺘﻤﺗ ﻲﻬﻓ ،ﺎﻫﺎﻨﻓﺮﻋ ﺔﻴﺣ ﺔﻨﻴﻔﺳ ﻱﺃ ﻪﺒﺸﻳ ﻻ ﺎﻬﻠﻜﺷ .ﺀﺎﻀﻔﻟﺍ ﻕﺎﻤﻋﺃ ﻲﻓ ﻢﻳﺪﻗ ﻥﺎﻴﻜﻟ ﺔﻓﺮﺠﻨﻣ ﺎﻳﺎﻘﺑ ﻑﺎﺸﺘﻛﺍ ﻢﺗ"

